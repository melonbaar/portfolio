    <script>

const container = document.getElementById("imageContainer");

let isUserInteracting = false;
let startTime = null;
let startScroll = 0;
let speed = 5; // pixels per second (adjust this)

function autoScroll(timestamp) {
  if (!startTime) {
    startTime = timestamp;
    startScroll = container.scrollLeft;
  }

  if (!isUserInteracting) {
    const elapsed = (timestamp - startTime) / 1000; // seconds
    container.scrollLeft = startScroll + (elapsed * speed);
  } else {
    // reset timing when user interrupts
    startTime = timestamp;
    startScroll = container.scrollLeft;
  }

  requestAnimationFrame(autoScroll);
}

// Interaction detection
container.addEventListener("mousedown", () => isUserInteracting = true);
container.addEventListener("touchstart", () => isUserInteracting = true);
container.addEventListener("wheel", () => isUserInteracting = true);

container.addEventListener("mouseup", resumeAutoScroll);
container.addEventListener("touchend", resumeAutoScroll);

let timeout;
function resumeAutoScroll() {
  clearTimeout(timeout);
  timeout = setTimeout(() => {
    isUserInteracting = false;
    startTime = null; // restart smooth timing
  }, 800);
}

// start
requestAnimationFrame(autoScroll);

    
    const imageContainer = document.getElementById("imageContainer");
    const scrollTitle = document.getElementById("scrollTitle");
    const progressBar = document.getElementById("progressBar");

    imageContainer.addEventListener("scroll", function () {
      const scrollLeft = imageContainer.scrollLeft;
      const maxScrollLeft = imageContainer.scrollWidth - imageContainer.clientWidth;
      const progress = scrollLeft / maxScrollLeft;

      // Max 7 'w's added
      const wCount = Math.floor(progress * 12);
      scrollTitle.textContent = "kylie" + "w".repeat(wCount) + "woods";

      // Optional: update progress bar
      progressBar.style.width = (progress * 100) + "%";
    });

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
    }
      

        function showTooltip(event, text) {
            let tooltip = document.getElementById("tooltip");
            tooltip.innerText = text;
            tooltip.style.visibility = "visible";
            tooltip.style.opacity = "0.9";
        }

        function moveTooltip(event) {
            let tooltip = document.getElementById("tooltip");
            tooltip.style.left = event.pageX + 10 + "px";
            tooltip.style.top = event.pageY + 10 + "px";
        }

        function hideTooltip() {
            let tooltip = document.getElementById("tooltip");
            tooltip.style.visibility = "hidden";
            tooltip.style.opacity = "0";
        }

        
    </script>
